# HTTP — редирект на HTTPS (раскомментируйте после выпуска сертификата)
# upstream
upstream cyberedu_frontend {
  server frontend:3000;
  keepalive 16;
}

upstream cyberedu_backend {
  server backend:8000;
  keepalive 8;
}

# --- HTTP only (первый запуск / certbot webroot) ---
server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Certbot ACME challenge (optional)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health для балансировщика / uptime
  location /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location /api/v1/ {
    proxy_pass http://cyberedu_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  location / {
    proxy_pass http://cyberedu_frontend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 120s;
  }
}

# --- HTTPS (скопируйте из cyberedu.ssl.conf.example после certbot) ---
