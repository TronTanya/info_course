# HTTP entrypoint: ACME challenge + redirect to HTTPS.
# upstream
upstream cyberedu_frontend {
  server frontend:3000;
  keepalive 16;
}

upstream cyberedu_backend {
  server backend:8000;
  keepalive 8;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;

  # Certbot ACME challenge (optional)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Health для балансировщика / uptime
  location /nginx-health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Default production-safe behavior: always redirect to TLS.
  location / {
    return 301 https://$host$request_uri;
  }
}

# HTTPS vhost lives in cyberedu.ssl.conf (copied from cyberedu.ssl.conf.example).
