user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  server_tokens off;

  # Gzip для статики Next
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

  client_max_body_size 25m;

  # Edge rate limits (см. cyberedu.ssl.conf.example — location /api/, /api/auth/).
  limit_req_zone $binary_remote_addr zone=cyberedu_api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=cyberedu_auth:10m rate=10r/s;

  include /etc/nginx/conf.d/*.conf;
}
