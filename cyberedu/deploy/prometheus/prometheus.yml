global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cyberedu-backend
    metrics_path: /api/v1/health
    static_configs:
      - targets: ["backend:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: cyberedu-backend

  # Nginx stub_status — включите в nginx.conf при необходимости
  # - job_name: nginx
  #   static_configs:
  #     - targets: ["nginx:8080"]
