# Production stack (VPS). Обязательно:
#   cp .env.prod.example .env.production && chmod 600 .env.production
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Локальная проверка YAML (без warnings): ./scripts/compose-prod-config.sh
#
# Секреты только runtime (env_file + --env-file). Build args без DATABASE_URL / AUTH_SECRET / OPENAI_API_KEY.

name: cyberedu-prod

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"
    tag: "{{.Name}}"

x-prod-env: &prod-env
  env_file:
    - path: .env.production
      required: false

services:
  postgres:
    <<: *prod-env
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required — use --env-file .env.prod.example for local config}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [internal]
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?POSTGRES_USER is required} -d ${POSTGRES_DB:?POSTGRES_DB is required}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    # Порт не публикуется — только internal network

  redis:
    <<: *prod-env
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    networks: [internal]
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Порт не публикуется

  backend:
    <<: *prod-env
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      NODE_ENV: ${NODE_ENV:-production}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
    networks: [internal]
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend-migrate:
    <<: *prod-env
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: migrate
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
    networks: [internal]
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    <<: *prod-env
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.prod.sh"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required}
      NEXTAUTH_URL: ${AUTH_URL:?AUTH_URL is required}
      NEXTAUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET is required}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SHOW_SEED_LOGIN_HINT: ${SHOW_SEED_LOGIN_HINT:-0}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-1}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      RUN_SEED: ${RUN_SEED:-0}
      AUTH_SESSION_MAX_AGE: ${AUTH_SESSION_MAX_AGE:-172800}
      SECURITY_AUDIT_DB: ${SECURITY_AUDIT_DB:-1}
      UPLOADS_DIR: /app/uploads
    volumes:
      - frontend_uploads:/app/uploads
    networks: [internal]
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
      frontend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks: [internal]
    logging: *default-logging
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [internal]
    logging: *default-logging
    ports:
      - "127.0.0.1:9090:9090"

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  frontend_uploads:
  nginx_logs:
  prometheus_data:
