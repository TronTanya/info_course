# Development stack (docker compose up --build)
# - Postgres / Redis / pgAdmin / API / site — только 127.0.0.1 на хосте
# - Redis включён по умолчанию (rate limit как в production)
# - Секреты только runtime (environment / .env), не build-args
# - Seed: RUN_SEED=1 docker compose up --build  (по умолчанию RUN_SEED=0)
#
# Production: docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

name: cyberedu-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cyberedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyberedu_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-cyberedu}
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cyberedu} -d ${POSTGRES_DB:-cyberedu}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8.14
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-pgadmin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_dev_change_me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "127.0.0.1:15050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:18000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cyberedu}:${POSTGRES_PASSWORD:-cyberedu_dev_password}@postgres:5432/${POSTGRES_DB:-cyberedu}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-me-in-production-min-32}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-cyberedu-dev-internal-api-key-change-me}
      CORS_ORIGINS: http://localhost:3100,http://127.0.0.1:3100
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-bookworm-slim}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cyberedu}:${POSTGRES_PASSWORD:-cyberedu_dev_password}@postgres:5432/${POSTGRES_DB:-cyberedu}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-in-production-min-32-chars}
      AUTH_URL: ${AUTH_URL:-http://localhost:3100}
      NEXTAUTH_URL: ${AUTH_URL:-http://localhost:3100}
      NEXTAUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me-in-production-min-32-chars}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3100}
      NEXT_PUBLIC_API_URL: http://127.0.0.1:18000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SHOW_SEED_LOGIN_HINT: ${SHOW_SEED_LOGIN_HINT:-1}
      TRUSTED_PROXY: ${TRUSTED_PROXY:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Seed только при явном RUN_SEED=1 (не сбрасывает admin при каждом restart)
      RUN_SEED: ${RUN_SEED:-0}
      AUTH_SESSION_MAX_AGE: ${AUTH_SESSION_MAX_AGE:-172800}
      UPLOADS_DIR: /app/uploads
    volumes:
      - frontend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  frontend_uploads:
