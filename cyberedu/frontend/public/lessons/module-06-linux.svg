<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="Linux и сети">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg6)"/>
  <rect x="180" y="60" width="440" height="260" rx="10" fill="#111827" stroke="#6b7280" stroke-width="2"/>
  <rect x="200" y="80" width="400" height="28" rx="4" fill="#374151"/>
  <text x="220" y="100" fill="#9ca3af" font-family="ui-monospace,monospace" font-size="13">user@lab:~$</text>
  <text x="200" y="140" fill="#4ade80" font-family="ui-monospace,monospace" font-size="14">$ ping -c 3 gateway.lab</text>
  <text x="200" y="168" fill="#d1d5db" font-family="ui-monospace,monospace" font-size="13">64 bytes from 10.0.0.1: icmp_seq=1</text>
  <text x="200" y="192" fill="#d1d5db" font-family="ui-monospace,monospace" font-size="13">64 bytes from 10.0.0.1: icmp_seq=2</text>
  <text x="200" y="220" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="14">$ traceroute service.lab</text>
  <circle cx="620" cy="200" r="60" fill="#22c55e" opacity="0.15"/>
  <circle cx="620" cy="200" r="40" fill="none" stroke="#4ade80" stroke-width="2"/>
  <circle cx="620" cy="200" r="20" fill="none" stroke="#4ade80" stroke-width="2"/>
  <text x="400" y="360" text-anchor="middle" fill="#9ca3af" font-family="system-ui,sans-serif" font-size="18">Модуль 6 — Linux и сети</text>
</svg>
