# Lint, typecheck, tests, Docker build smoke — на каждый PR и push в main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
  SKIP_DB_LIFESPAN_CHECK: "1"

jobs:
  frontend-lint-typecheck-test:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cyberedu/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
        env:
          AUTH_SECRET: ci-auth-secret-minimum-32-characters-long-ok
          OPENAI_API_KEY: ""

  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cyberedu/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cyberedu/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://cyberedu:ci@127.0.0.1:5432/cyberedu
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          SKIP_DB_LIFESPAN_CHECK: ${{ env.SKIP_DB_LIFESPAN_CHECK }}
          ENVIRONMENT: development

  compose-config:
    name: Validate Compose configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dev compose config
        working-directory: cyberedu
        run: docker compose -f docker-compose.yml config --quiet

      - name: Production compose config
        working-directory: cyberedu
        run: |
          cp .env.production.example .env.production
          docker compose \
            -f docker-compose.prod.yml \
            --env-file .env.production \
            config --quiet

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [frontend-lint-typecheck-test, backend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images
        working-directory: cyberedu
        env:
          AUTH_SECRET: ci-build-auth-secret-minimum-32-chars-x
          JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
        run: |
          docker compose -f docker-compose.yml build --parallel
          docker compose -f docker-compose.prod.yml \
            --env-file .env.production.example build --parallel
