# Lint, typecheck, tests, Prisma, Compose, audits, E2E (incl. production + Redis).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
  SKIP_DB_LIFESPAN_CHECK: "1"

jobs:
  workflow-validate:
    name: Validate workflow YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse CI workflow
        run: |
          python3 - <<'PY'
          import yaml
          from pathlib import Path
          p = Path(".github/workflows/ci.yml")
          yaml.safe_load(p.read_text())
          print("CI YAML OK")
          PY

  frontend:
    name: Frontend (lint, typecheck, test, audit)
    runs-on: ubuntu-latest
    needs: [workflow-validate]
    defaults:
      run:
        working-directory: cyberedu/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Prisma generate
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
        env:
          AUTH_SECRET: ci-auth-secret-minimum-32-characters-long-ok
          OPENAI_API_KEY: ""

      - name: Rate limit production guard
        run: bash ../scripts/check-rate-limit-production.sh

      # postcss <8.5.10 was a transitive dep of next — pinned via package.json overrides (GHSA-qx2v-qp2m-jg93).
      - name: npm audit (high and critical)
        run: npm audit --audit-level=high

  compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    needs: [workflow-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Dev compose config
        run: docker compose -f cyberedu/docker-compose.yml config --quiet

      - name: Production compose config
        run: |
          docker compose \
            -f cyberedu/docker-compose.prod.yml \
            --env-file cyberedu/.env.prod.example \
            config --quiet

  rate-limit-redis:
    name: Rate limit (Redis integration)
    runs-on: ubuntu-latest
    needs: [frontend]
    defaults:
      run:
        working-directory: cyberedu/frontend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      REDIS_URL: redis://127.0.0.1:6379
      ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Redis rate limit integration tests
        run: npx vitest run tests/rate-limit-redis.integration.test.ts

  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    needs: [workflow-validate]
    defaults:
      run:
        working-directory: cyberedu/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cyberedu/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://cyberedu:ci@127.0.0.1:5432/cyberedu
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          SKIP_DB_LIFESPAN_CHECK: ${{ env.SKIP_DB_LIFESPAN_CHECK }}
          ENVIRONMENT: development

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (dependencies)
        run: pip-audit -r requirements.txt
        continue-on-error: true

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: [frontend, compose-config]
    defaults:
      run:
        working-directory: cyberedu/frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cyberedu
          POSTGRES_PASSWORD: cyberedu_ci_e2e
          POSTGRES_DB: cyberedu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyberedu -d cyberedu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cyberedu:cyberedu_ci_e2e@127.0.0.1:5432/cyberedu?schema=public
      AUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters-long
      AUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters-long
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:18000
      ENVIRONMENT: test
      E2E_USE_SEED_CREDENTIALS: "1"
      RUN_SEED: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Migrate and seed (test data)
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run smoke tests
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3100/api/health >/dev/null; then
              echo "App ready"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3100/api/health
          npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            cyberedu/frontend/playwright-report
            cyberedu/frontend/e2e-results
          retention-days: 7

  e2e-prod-smoke:
    name: Staging smoke (Postgres + Redis + Playwright)
    runs-on: ubuntu-latest
    needs: [frontend, compose-config]
    defaults:
      run:
        working-directory: cyberedu/frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cyberedu
          POSTGRES_PASSWORD: cyberedu_ci_e2e_prod
          POSTGRES_DB: cyberedu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyberedu -d cyberedu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ENVIRONMENT: production
      E2E_PRODUCTION_SMOKE: "1"
      DATABASE_URL: postgresql://cyberedu:cyberedu_ci_e2e_prod@127.0.0.1:5432/cyberedu?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      AUTH_SECRET: ci-e2e-prod-auth-secret-minimum-32-characters
      AUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_SECRET: ci-e2e-prod-auth-secret-minimum-32-characters
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:18000
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Migrate and seed (isolated CI DB)
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Verify Redis service (PING)
        run: |
          echo "REDIS_URL=$REDIS_URL"
          npm run redis:ping

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build Next.js (production)
        run: npm run build

      - name: Run staging smoke (production ENV + real Redis)
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3100/api/health | grep -q '"redis":"ok"'; then
              echo "App ready (ENVIRONMENT=production, Redis ok)"
              break
            fi
            sleep 2
          done
          health="$(curl -sf http://127.0.0.1:3100/api/health)"
          echo "$health"
          echo "$health" | grep -q '"redis":"ok"' || {
            echo "::error::/api/health redis check failed — REDIS_URL must point to live Redis"
            exit 1
          }
          echo "::notice title=Redis::Staging smoke — Redis PONG ok; app health reports checks.redis=ok ($REDIS_URL)"
          npm run redis:ping
          npm run test:e2e:staging

      - name: Upload Playwright prod report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-prod
          path: |
            cyberedu/frontend/playwright-report-prod
            cyberedu/frontend/e2e-results-prod
          retention-days: 7

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [frontend, compose-config, backend-test, rate-limit-redis, e2e-smoke, e2e-prod-smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images
        working-directory: cyberedu
        env:
          AUTH_SECRET: ci-build-auth-secret-minimum-32-chars-x
          JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
        run: |
          docker compose -f docker-compose.yml build --parallel
          docker compose -f docker-compose.prod.yml \
            --env-file .env.prod.example build --parallel
