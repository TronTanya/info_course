# Lint, typecheck, tests, Docker build smoke — на каждый PR и push в main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
  SKIP_DB_LIFESPAN_CHECK: "1"

jobs:
  frontend-lint-typecheck-test:
    name: Frontend (lint, typecheck, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cyberedu/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
        env:
          AUTH_SECRET: ci-auth-secret-minimum-32-characters-long-ok
          OPENAI_API_KEY: ""

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cyberedu/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: cyberedu/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest
        run: pytest -q
        env:
          DATABASE_URL: postgresql+psycopg://cyberedu:ci@127.0.0.1:5432/cyberedu
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          SKIP_DB_LIFESPAN_CHECK: ${{ env.SKIP_DB_LIFESPAN_CHECK }}
          ENVIRONMENT: development

  compose-config:
    name: Validate Compose configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dev compose config
        working-directory: cyberedu
        run: docker compose -f docker-compose.yml config --quiet

      - name: Production compose config
        working-directory: cyberedu
        run: |
          cp .env.production.example .env.production
          docker compose \
            -f docker-compose.prod.yml \
            --env-file .env.production \
            config --quiet

  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    needs: [frontend-lint-typecheck-test]
    defaults:
      run:
        working-directory: cyberedu/frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cyberedu
          POSTGRES_PASSWORD: cyberedu_ci_e2e
          POSTGRES_DB: cyberedu
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cyberedu -d cyberedu"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://cyberedu:cyberedu_ci_e2e@127.0.0.1:5432/cyberedu?schema=public
      AUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters-long
      AUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_URL: http://127.0.0.1:3100
      NEXTAUTH_SECRET: ci-e2e-auth-secret-minimum-32-characters-long
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_API_URL: http://127.0.0.1:18000
      ENVIRONMENT: test
      E2E_USE_SEED_CREDENTIALS: "1"
      RUN_SEED: "1"
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      OPENAI_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: cyberedu/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Migrate and seed (test data)
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build Next.js
        run: npm run build

      - name: Run smoke tests
        run: |
          npm run start &
          for i in $(seq 1 90); do
            if curl -sf http://127.0.0.1:3100/api/health >/dev/null; then
              echo "App ready"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3100/api/health
          npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            cyberedu/frontend/playwright-report
            cyberedu/frontend/e2e-results
          retention-days: 7

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [frontend-lint-typecheck-test, backend-test, e2e-smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build images
        working-directory: cyberedu
        env:
          AUTH_SECRET: ci-build-auth-secret-minimum-32-chars-x
          JWT_SECRET_KEY: ci-jwt-secret-key-minimum-32-characters-long
        run: |
          docker compose -f docker-compose.yml build --parallel
          docker compose -f docker-compose.prod.yml \
            --env-file .env.production.example build --parallel
